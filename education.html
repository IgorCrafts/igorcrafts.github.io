---
layout: default
permalink: /education/
---

    
<div class="container" style="text-align:center; margin-bottom:40px;">

  <div class="row" id="about">
    <div class="col-md-8 offset-md-2">
    <h2 class="page-title">Education</h2>
    <h3 class="page-subtitle text-muted">My past as a scientist.</h3>
    <hr style="width:40%; background:#02456F;">
    </div>
  </div>


  <div class="row">
    <div class="col-md-8 offset-md-2">
      {% for edu in site.data.education %}
        <div class="row education-row">
          <div class="col-md-2 education-img">
            <img class="img-fluid" src="{{site.baseurl}}/{{edu.img}}" alt="{{edu.title}}">
          </div>
          <div class="col-md-10">
            <div class="about-text">
              <div class="education-title">{{edu.title}}</div>
              <div class="education-period">{{edu.period}}</div>
              <div>{{edu.description}}</div>
              {% for tag in edu.tags %}
                <span class="education-tag">{{tag}}</span>
              {% endfor %}
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>

</div>

<script>
  var aboutlink = document.getElementById('educationlink');
  aboutlink.className="nav-link main-nav-link active";
</script>
